version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ev_erp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ev_erp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev_erp_network

  redis:
    image: redis:7-alpine
    container_name: ev_erp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev_erp_network

volumes:
  postgres_data:
  redis_data:

networks:
  ev_erp_network:
    driver: bridge
